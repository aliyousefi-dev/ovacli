<dialog id="saveToModal_1" class="modal">
  <div class="modal-box bg-base-100 p-1 w-100 h-100 shadow-md flex flex-col" (click)="$event.stopPropagation()">

    <div class="w-full flex flex-col px-5 py-3 justify-center ">
      <div class="flex justify-between">
        <span class="card-title">Save To</span>
        <div class="flex justify-end items-center">
          <button class="btn btn-ghost btn-sm" (click)="openModalPlaylistCreator()">
            <i class="bx bx-plus bx-xs"></i>
          </button>
          <button class="btn btn-ghost btn-sm" (click)="fetchPlaylists()">
            <i class="bx bx-revision bx-xs"></i>
          </button>
        </div>
      </div>

    </div>

    <!-- Playlist -->
    <div class="flex flex-col overflow-y-auto">

      <!-- No playlists available -->
      @if (availablePlaylist.length === 0 ) {
      <div class="text-center py-4 text-gray-500">
        No playlists found.
      </div>
      }

      @if (availablePlaylist.length > 0) {
      @for (item of availablePlaylist; track $index) {
      <label class="flex gap-2 items-center hover:bg-base-300 px-6 py-2 cursor-pointer"
        (click)="saveToPlaylist(item.id);">
        <span class="text-xs select-none">{{ item.title }}</span>
      </label>
      }
      }
    </div>

  </div>

  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>

<playlist-create-modal></playlist-create-modal>

<dialog #dialog id="playlistCreateModal" class="modal">
  <form (ngSubmit)="submit()" class="modal-box bg-base-200" (click)="$event.stopPropagation()">

    <h3 class="font-bold text-xl mb-4">
      Create New Playlist
    </h3>

    <div class="form-control w-full">
      <label for="playlistNameInput" class="sr-only">Playlist Name</label>
      <input #playlistInput name="playlistName" id="playlistNameInput" type="text" [(ngModel)]="playlistName"
        placeholder="Enter playlist name" class="input input-bordered w-full" aria-required="true"
        [disabled]="isLoading" autocomplete="off" />

      <p *ngIf="creationError" class="text-error text-sm mt-2">
        {{ creationError }}
      </p>
    </div>

    <div class="modal-action mt-6 flex justify-end space-x-3">
      <button type="button" class="btn btn-ghost" (click)="close()" [disabled]="isLoading">
        Cancel
      </button>

      <button type="submit" class="btn btn-primary" [disabled]="!playlistName.trim() || isLoading">
        <span *ngIf="isLoading" class="loading loading-spinner loading-xs"></span>
        {{ isLoading ? 'Creating...' : 'Create' }}
      </button>
    </div>
  </form>

  <form method="dialog" class="modal-backdrop">
    <button (click)="close()">close</button>
  </form>
</dialog>

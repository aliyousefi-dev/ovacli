<!-- Playlist Card -->
<div class="flex bg-base-200 w-full items-center gap-3">

  <!-- Thumbnail -->
  <div class="h-26 flex-1/3 overflow-hidden">
    @if ( getThumbnailUrl() ) {
    <img [src]="getThumbnailUrl()" alt="thumbnail" class="w-full h-full object-cover" />
    }
    @else {
    <div class="flex items-center justify-center w-full h-full text-xs bg-base-300 rounded-box">
      No videos
    </div>
    }
  </div>

  <div class="flex flex-2/3 justify-center items-center">
    <!-- Info Section -->
    <div class=" flex-1 flex-col justify-center items-start " (click)="goToPlaylistContent()">
      <h3 class="text-sm font-semibold truncate  " [title]="playlist.title">
        {{ playlist.title }}
      </h3>
      <!-- Description -->
      <p class="text-xs truncate mt-0.5 min-w-0" [title]="playlist.description || 'No description provided.'">
        {{ playlist.description || "No description provided." }}
      </p>
    </div>

    <!-- Total Videos -->
    <span class="text-[10px] font-medium bg-base-100 rounded-lg px-3 py-1 flex justify-center items-center ">
      {{ playlist.videoCount }} videos
    </span>

    <!-- Action menu -->
    <div class="dropdown mr-2 ">
      <div tabindex="0" role=" button" class="btn btn-xs btn-ghost"><i class='bx bx-dots-vertical-rounded bx-xs'></i>
      </div>
      <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-1 w-52 p-2 shadow-sm">
        <li>
          <button class="w-full text-left px-3 py-1 text-xs hover:bg-base-300 rounded-t-md"
            (click)="openEditPlaylistModal();">
            Edit
          </button>
        </li>
        <li>
          <button class="w-full text-left px-3 py-1 text-xs hover:bg-base-300 rounded-t-md"
            (click)="openEditPlaylistModal();">
            Share
          </button>
        </li>
        <li>
          <button class="w-full text-left px-3 py-1 text-xs hover:bg-base-300 rounded-b-md"
            (click)="openDeletePlaylistModal();">
            Delete
          </button>
        </li>
      </ul>
    </div>

  </div>


</div>

<!-- Confirm Modal -->
<app-confirm-modal #confirmModal (cancelled)="(null)"></app-confirm-modal>

<!-- Edit Playlist Modal -->
<playlist-edit-modal [visible]="editModalVisible" [title]="editTitle" [description]="editDescription"
  (cancelled)="onEditCancelled()" (saved)="onEditSaved($event)"></playlist-edit-modal>

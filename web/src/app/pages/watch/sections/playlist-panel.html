<div class="bg-base-100 p-4 ">

  <div class="flex justify-between items-center mb-4 px-5">
    <h2 class="text-base font-semibold">Playlists</h2>

    <span>{{playlistVideos.length}} videos</span>
  </div>

  <div class="flex flex-col h-150 overflow-y-auto gap-2">
    @for (item of playlistVideos; track $index) {
    <div [ngClass]="{ 'bg-base-300': this.selectedVideoId == item.videoId}" class="flex hover:bg-base-300 p-3"
      (click)="navigate(item.videoId)">
      <div class="relative">
        <img class="w-full h-full rounded-lg" [src]="this.ovaSdk.assets.thumbnail(item.videoId)" alt="">

        <span
          class="absolute bottom-2 right-2 bg-black text-white bg-opacity-60 text-xs px-2 py-1 rounded-full select-none">{{this.formatTime(item.codecs.durationSec)}}
        </span>
      </div>

      <div class="flex-1/2 flex flex-col  min-w-0 max-w-full p-4">
        <span class="text-start truncate ">{{item.title}}</span>
        <span class="text-start truncate text-xs">{{timeSinceAdded(item.uploadedAt)}}</span>
      </div>

    </div>
    }
  </div>


</div>
